openapi: 3.0.3
info:
  title: 运维决策服务 API
  version: v1
  description: 面向飞机维修和设备检修的四阶段交互式运维决策接口。调用方必须严格遵循“澄清 -> 检索 -> 执行 -> 反馈”的顺序，不得跳步。澄清阶段需要单独等待确认；检索结果展示后可在同次交互中直接进入执行阶段；反馈阶段仍需等待用户选择方案。
servers:
  - url: http://localhost:8080
paths:
  /api/v1/aircraft/{tailNo}/status-history:
    get:
      summary: 查询飞机状态和历史信息
      parameters:
        - $ref: '#/components/parameters/TailNo'
      responses:
        '200':
          description: 飞机状态和历史信息
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /api/v1/aircraft/{tailNo}/mel-release:
    get:
      summary: 查询飞机 MEL 放行评估结果
      parameters:
        - $ref: '#/components/parameters/TailNo'
        - in: query
          name: component
          schema:
            type: string
        - in: query
          name: leakAreaCm2
          schema:
            type: number
            format: double
        - in: query
          name: continuousDrip
          schema:
            type: boolean
      responses:
        '200':
          description: MEL 放行评估结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /api/v1/aircraft/{tailNo}/environment:
    get:
      summary: 查询飞机当前环境和机位信息
      parameters:
        - $ref: '#/components/parameters/TailNo'
      responses:
        '200':
          description: 飞机环境信息
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /api/v1/aircraft/{tailNo}/troubleshooting-kb:
    get:
      summary: 查询飞机故障排查知识
      parameters:
        - $ref: '#/components/parameters/TailNo'
      responses:
        '200':
          description: 故障排查知识
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /api/v1/aircraft/{tailNo}/knowledge-graph:
    get:
      summary: 查询飞机知识图谱推理结果
      parameters:
        - $ref: '#/components/parameters/TailNo'
      responses:
        '200':
          description: 知识图谱推理结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /api/v1/aircraft/{tailNo}/personnel-match:
    get:
      summary: 查询飞机维修人员匹配结果
      parameters:
        - $ref: '#/components/parameters/TailNo'
      responses:
        '200':
          description: 人员匹配结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /api/v1/aircraft/{tailNo}/inventory:
    get:
      summary: 查询飞机航材和工具库存
      parameters:
        - $ref: '#/components/parameters/TailNo'
      responses:
        '200':
          description: 飞机库存结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /api/v1/aircraft/{tailNo}/diagnosis-conclusion:
    post:
      summary: 生成飞机诊断结论
      parameters:
        - $ref: '#/components/parameters/TailNo'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AircraftDiagnosisRequest'
      responses:
        '200':
          description: 飞机诊断结论
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /api/v1/aircraft/{tailNo}/disposition-decision:
    post:
      summary: 生成飞机处置决策
      parameters:
        - $ref: '#/components/parameters/TailNo'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AircraftDispositionRequest'
      responses:
        '200':
          description: 飞机处置决策
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /api/v1/aircraft/{tailNo}/workflow/clarify:
    post:
      summary: 飞机 workflow 的澄清阶段
      description: 四阶段流程的唯一入口。此阶段只允许展示设备/飞机基础信息与后续动作说明，必须等待用户确认后才能进入检索阶段。
      parameters:
        - $ref: '#/components/parameters/TailNo'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AircraftWorkflowRequest'
      responses:
        '200':
          description: 飞机澄清阶段结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /api/v1/aircraft/{tailNo}/workflow/retrieval:
    post:
      summary: 飞机 workflow 的检索阶段
      description: 仅可在澄清确认完成后调用。返回检索摘要 `retrievedInfo` 与完整详情 `retrievedDetails`，完整详情直接展示不收起。检索结果展示后可在同次交互中直接进入执行阶段，不需要额外确认；但不得直接跳到最终反馈。
      parameters:
        - $ref: '#/components/parameters/TailNo'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AircraftWorkflowRequest'
      responses:
        '200':
          description: 飞机检索阶段结果，包含摘要与完整详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
      x-retrieval-details:
        - statusHistory
        - melAssessment
        - environment
        - troubleshootingKnowledge
        - knowledgeGraph
        - personnelMatch
        - inventory
        - diagnosisConclusion
  /api/v1/aircraft/{tailNo}/workflow/execution:
    post:
      summary: 飞机 workflow 的执行阶段
      description: 仅可在检索阶段完成并展示后调用。通常紧跟检索阶段输出，且不要求额外确认。必须给出 2-3 个候选方案并等待用户确认或选择，不能直接输出最终回执。
      parameters:
        - $ref: '#/components/parameters/TailNo'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AircraftWorkflowRequest'
      responses:
        '200':
          description: 飞机执行阶段结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /api/v1/aircraft/{tailNo}/workflow/feedback:
    post:
      summary: 飞机 workflow 的反馈阶段
      description: 仅可在用户已经明确选择 `selectedOptionCode` 后调用。此阶段用于返回最终执行回执，不能反向补做方案选择。
      parameters:
        - $ref: '#/components/parameters/TailNo'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AircraftWorkflowRequest'
      responses:
        '200':
          description: 飞机反馈阶段结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /api/v1/equipment/{equipmentId}/digital-twin:
    get:
      summary: 查询设备数字孪生基础信息
      parameters:
        - $ref: '#/components/parameters/EquipmentId'
      responses:
        '200':
          description: 设备数字孪生信息
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /api/v1/equipment/{equipmentId}/telemetry:
    get:
      summary: 查询设备实时遥测
      parameters:
        - $ref: '#/components/parameters/EquipmentId'
      responses:
        '200':
          description: 设备遥测信息
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /api/v1/equipment/{equipmentId}/historical-cases:
    get:
      summary: 查询设备历史案例
      parameters:
        - $ref: '#/components/parameters/EquipmentId'
      responses:
        '200':
          description: 设备历史案例
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /api/v1/equipment/{equipmentId}/change-relations:
    get:
      summary: 查询设备相关变更
      parameters:
        - $ref: '#/components/parameters/EquipmentId'
      responses:
        '200':
          description: 设备变更信息
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /api/v1/equipment/{equipmentId}/personnel-match:
    get:
      summary: 查询设备维修人员匹配结果
      parameters:
        - $ref: '#/components/parameters/EquipmentId'
      responses:
        '200':
          description: 设备维修人员匹配结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /api/v1/equipment/{equipmentId}/inventory:
    get:
      summary: 查询设备备件和工具库存
      parameters:
        - $ref: '#/components/parameters/EquipmentId'
      responses:
        '200':
          description: 设备库存结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /api/v1/equipment/{equipmentId}/diagnosis-conclusion:
    post:
      summary: 生成设备诊断结论
      parameters:
        - $ref: '#/components/parameters/EquipmentId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EquipmentDiagnosisRequest'
      responses:
        '200':
          description: 设备诊断结论
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /api/v1/equipment/{equipmentId}/disposition-decision:
    post:
      summary: 生成设备处置决策
      parameters:
        - $ref: '#/components/parameters/EquipmentId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EquipmentDispositionRequest'
      responses:
        '200':
          description: 设备处置决策
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /api/v1/equipment/{equipmentId}/workflow/clarify:
    post:
      summary: 设备 workflow 的澄清阶段
      description: 四阶段流程的唯一入口。此阶段只允许展示设备基础信息与后续动作说明，必须等待用户确认后才能进入检索阶段。
      parameters:
        - $ref: '#/components/parameters/EquipmentId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EquipmentWorkflowRequest'
      responses:
        '200':
          description: 设备澄清阶段结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /api/v1/equipment/{equipmentId}/workflow/retrieval:
    post:
      summary: 设备 workflow 的检索阶段
      description: 仅可在澄清确认完成后调用。返回检索摘要 `retrievedInfo` 与完整详情 `retrievedDetails`，完整详情直接展示不收起。检索结果展示后可在同次交互中直接进入执行阶段，不需要额外确认；但不得直接跳到最终反馈。
      parameters:
        - $ref: '#/components/parameters/EquipmentId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EquipmentWorkflowRequest'
      responses:
        '200':
          description: 设备检索阶段结果，包含摘要与完整详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
      x-retrieval-details:
        - digitalTwin
        - telemetry
        - historicalCases
        - changeRelations
        - personnelMatch
        - inventory
        - diagnosisConclusion
  /api/v1/equipment/{equipmentId}/workflow/execution:
    post:
      summary: 设备 workflow 的执行阶段
      description: 仅可在检索阶段完成并展示后调用。通常紧跟检索阶段输出，且不要求额外确认。必须给出 2-3 个候选方案并等待用户确认或选择，不能直接输出最终回执。
      parameters:
        - $ref: '#/components/parameters/EquipmentId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EquipmentWorkflowRequest'
      responses:
        '200':
          description: 设备执行阶段结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /api/v1/equipment/{equipmentId}/workflow/feedback:
    post:
      summary: 设备 workflow 的反馈阶段
      description: 仅可在用户已经明确选择 `selectedOptionCode` 后调用。此阶段用于返回最终执行回执，不能反向补做方案选择。
      parameters:
        - $ref: '#/components/parameters/EquipmentId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EquipmentWorkflowRequest'
      responses:
        '200':
          description: 设备反馈阶段结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
components:
  parameters:
    TailNo:
      in: path
      name: tailNo
      required: true
      schema:
        type: string
      example: B-1234
    EquipmentId:
      in: path
      name: equipmentId
      required: true
      schema:
        type: string
      example: MOT-2024-A07
  schemas:
    ApiResponse:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        timestamp:
          type: string
        data:
          type: object
          additionalProperties: true
    AircraftDiagnosisRequest:
      type: object
      properties:
        leakAreaCm2:
          type: number
          format: double
        continuousDrip:
          type: boolean
        repairTarget:
          type: string
    AircraftDispositionRequest:
      type: object
      properties:
        leakAreaCm2:
          type: number
          format: double
        continuousDrip:
          type: boolean
        repairTarget:
          type: string
    AircraftWorkflowRequest:
      type: object
      description: workflow 阶段请求体。`basicInfoConfirmed` 和 `followUpAcknowledged` 用于澄清阶段后的阶段确认；`selectedOptionCode` 仅用于反馈阶段，且必须来自执行阶段给出的候选方案。
      properties:
        component:
          type: string
        leakAreaCm2:
          type: number
          format: double
        continuousDrip:
          type: boolean
        repairTarget:
          type: string
        userIntent:
          type: string
        basicInfoConfirmed:
          type: boolean
          description: 用户已确认澄清阶段展示的基础信息。
        followUpAcknowledged:
          type: boolean
          description: 用户已确认可以进入后续检索/执行链路。
        selectedOptionCode:
          type: string
          description: 用户在执行阶段选定的方案编码。未选择方案时不得传入反馈阶段。
    EquipmentDiagnosisRequest:
      type: object
      properties:
        currentTemperatureC:
          type: number
          format: double
        vibrationMmPerS:
          type: number
          format: double
        temperatureRiseRatePerMin:
          type: number
          format: double
    EquipmentDispositionRequest:
      type: object
      properties:
        immediateShutdown:
          type: boolean
        reserveBearing:
          type: boolean
        pushWorkOrder:
          type: boolean
    EquipmentWorkflowRequest:
      type: object
      description: workflow 阶段请求体。`basicInfoConfirmed` 和 `followUpAcknowledged` 用于澄清阶段后的阶段确认；`selectedOptionCode` 仅用于反馈阶段，且必须来自执行阶段给出的候选方案。
      properties:
        currentTemperatureC:
          type: number
          format: double
        vibrationMmPerS:
          type: number
          format: double
        temperatureRiseRatePerMin:
          type: number
          format: double
        immediateShutdown:
          type: boolean
        reserveBearing:
          type: boolean
        pushWorkOrder:
          type: boolean
        userIntent:
          type: string
        basicInfoConfirmed:
          type: boolean
          description: 用户已确认澄清阶段展示的基础信息。
        followUpAcknowledged:
          type: boolean
          description: 用户已确认可以进入后续检索/执行链路。
        selectedOptionCode:
          type: string
          description: 用户在执行阶段选定的方案编码。未选择方案时不得传入反馈阶段。
