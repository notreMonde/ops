openapi: 3.0.3
info:
  title: 运维决策服务 API
  version: v1
  description: 面向飞机维修和设备检修的四阶段交互式运维决策接口。
servers:
  - url: http://localhost:8080
paths:
  /api/v1/aircraft/{tailNo}/status-history:
    get:
      summary: 查询飞机状态和历史信息
      parameters:
        - $ref: '#/components/parameters/TailNo'
      responses:
        '200':
          description: 飞机状态和历史信息
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /api/v1/aircraft/{tailNo}/mel-release:
    get:
      summary: 查询飞机 MEL 放行评估结果
      parameters:
        - $ref: '#/components/parameters/TailNo'
        - in: query
          name: component
          schema:
            type: string
        - in: query
          name: leakAreaCm2
          schema:
            type: number
            format: double
        - in: query
          name: continuousDrip
          schema:
            type: boolean
      responses:
        '200':
          description: MEL 放行评估结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /api/v1/aircraft/{tailNo}/environment:
    get:
      summary: 查询飞机当前环境和机位信息
      parameters:
        - $ref: '#/components/parameters/TailNo'
      responses:
        '200':
          description: 飞机环境信息
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /api/v1/aircraft/{tailNo}/troubleshooting-kb:
    get:
      summary: 查询飞机故障排查知识
      parameters:
        - $ref: '#/components/parameters/TailNo'
      responses:
        '200':
          description: 故障排查知识
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /api/v1/aircraft/{tailNo}/knowledge-graph:
    get:
      summary: 查询飞机知识图谱推理结果
      parameters:
        - $ref: '#/components/parameters/TailNo'
      responses:
        '200':
          description: 知识图谱推理结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /api/v1/aircraft/{tailNo}/personnel-match:
    get:
      summary: 查询飞机维修人员匹配结果
      parameters:
        - $ref: '#/components/parameters/TailNo'
      responses:
        '200':
          description: 人员匹配结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /api/v1/aircraft/{tailNo}/inventory:
    get:
      summary: 查询飞机航材和工具库存
      parameters:
        - $ref: '#/components/parameters/TailNo'
      responses:
        '200':
          description: 飞机库存结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /api/v1/aircraft/{tailNo}/diagnosis-conclusion:
    post:
      summary: 生成飞机诊断结论
      parameters:
        - $ref: '#/components/parameters/TailNo'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AircraftDiagnosisRequest'
      responses:
        '200':
          description: 飞机诊断结论
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /api/v1/aircraft/{tailNo}/disposition-decision:
    post:
      summary: 生成飞机处置决策
      parameters:
        - $ref: '#/components/parameters/TailNo'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AircraftDispositionRequest'
      responses:
        '200':
          description: 飞机处置决策
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /api/v1/aircraft/{tailNo}/workflow/clarify:
    post:
      summary: 飞机 workflow 的澄清阶段
      parameters:
        - $ref: '#/components/parameters/TailNo'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AircraftWorkflowRequest'
      responses:
        '200':
          description: 飞机澄清阶段结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /api/v1/aircraft/{tailNo}/workflow/retrieval:
    post:
      summary: 飞机 workflow 的检索阶段
      description: 返回检索摘要 `retrievedInfo` 与完整详情 `retrievedDetails`，完整详情直接展示不收起。
      parameters:
        - $ref: '#/components/parameters/TailNo'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AircraftWorkflowRequest'
      responses:
        '200':
          description: 飞机检索阶段结果，包含摘要与完整详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
      x-retrieval-details:
        - statusHistory
        - melAssessment
        - environment
        - troubleshootingKnowledge
        - knowledgeGraph
        - personnelMatch
        - inventory
        - diagnosisConclusion
  /api/v1/aircraft/{tailNo}/workflow/execution:
    post:
      summary: 飞机 workflow 的执行阶段
      parameters:
        - $ref: '#/components/parameters/TailNo'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AircraftWorkflowRequest'
      responses:
        '200':
          description: 飞机执行阶段结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /api/v1/aircraft/{tailNo}/workflow/feedback:
    post:
      summary: 飞机 workflow 的反馈阶段
      parameters:
        - $ref: '#/components/parameters/TailNo'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AircraftWorkflowRequest'
      responses:
        '200':
          description: 飞机反馈阶段结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /api/v1/equipment/{equipmentId}/digital-twin:
    get:
      summary: 查询设备数字孪生基础信息
      parameters:
        - $ref: '#/components/parameters/EquipmentId'
      responses:
        '200':
          description: 设备数字孪生信息
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /api/v1/equipment/{equipmentId}/telemetry:
    get:
      summary: 查询设备实时遥测
      parameters:
        - $ref: '#/components/parameters/EquipmentId'
      responses:
        '200':
          description: 设备遥测信息
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /api/v1/equipment/{equipmentId}/historical-cases:
    get:
      summary: 查询设备历史案例
      parameters:
        - $ref: '#/components/parameters/EquipmentId'
      responses:
        '200':
          description: 设备历史案例
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /api/v1/equipment/{equipmentId}/change-relations:
    get:
      summary: 查询设备相关变更
      parameters:
        - $ref: '#/components/parameters/EquipmentId'
      responses:
        '200':
          description: 设备变更信息
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /api/v1/equipment/{equipmentId}/personnel-match:
    get:
      summary: 查询设备维修人员匹配结果
      parameters:
        - $ref: '#/components/parameters/EquipmentId'
      responses:
        '200':
          description: 设备维修人员匹配结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /api/v1/equipment/{equipmentId}/inventory:
    get:
      summary: 查询设备备件和工具库存
      parameters:
        - $ref: '#/components/parameters/EquipmentId'
      responses:
        '200':
          description: 设备库存结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /api/v1/equipment/{equipmentId}/diagnosis-conclusion:
    post:
      summary: 生成设备诊断结论
      parameters:
        - $ref: '#/components/parameters/EquipmentId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EquipmentDiagnosisRequest'
      responses:
        '200':
          description: 设备诊断结论
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /api/v1/equipment/{equipmentId}/disposition-decision:
    post:
      summary: 生成设备处置决策
      parameters:
        - $ref: '#/components/parameters/EquipmentId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EquipmentDispositionRequest'
      responses:
        '200':
          description: 设备处置决策
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /api/v1/equipment/{equipmentId}/workflow/clarify:
    post:
      summary: 设备 workflow 的澄清阶段
      parameters:
        - $ref: '#/components/parameters/EquipmentId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EquipmentWorkflowRequest'
      responses:
        '200':
          description: 设备澄清阶段结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /api/v1/equipment/{equipmentId}/workflow/retrieval:
    post:
      summary: 设备 workflow 的检索阶段
      description: 返回检索摘要 `retrievedInfo` 与完整详情 `retrievedDetails`，完整详情直接展示不收起。
      parameters:
        - $ref: '#/components/parameters/EquipmentId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EquipmentWorkflowRequest'
      responses:
        '200':
          description: 设备检索阶段结果，包含摘要与完整详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
      x-retrieval-details:
        - digitalTwin
        - telemetry
        - historicalCases
        - changeRelations
        - personnelMatch
        - inventory
        - diagnosisConclusion
  /api/v1/equipment/{equipmentId}/workflow/execution:
    post:
      summary: 设备 workflow 的执行阶段
      parameters:
        - $ref: '#/components/parameters/EquipmentId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EquipmentWorkflowRequest'
      responses:
        '200':
          description: 设备执行阶段结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /api/v1/equipment/{equipmentId}/workflow/feedback:
    post:
      summary: 设备 workflow 的反馈阶段
      parameters:
        - $ref: '#/components/parameters/EquipmentId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EquipmentWorkflowRequest'
      responses:
        '200':
          description: 设备反馈阶段结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
components:
  parameters:
    TailNo:
      in: path
      name: tailNo
      required: true
      schema:
        type: string
      example: B-1234
    EquipmentId:
      in: path
      name: equipmentId
      required: true
      schema:
        type: string
      example: MOT-2024-A07
  schemas:
    ApiResponse:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        timestamp:
          type: string
        data:
          type: object
          additionalProperties: true
    AircraftDiagnosisRequest:
      type: object
      properties:
        leakAreaCm2:
          type: number
          format: double
        continuousDrip:
          type: boolean
        repairTarget:
          type: string
    AircraftDispositionRequest:
      type: object
      properties:
        leakAreaCm2:
          type: number
          format: double
        continuousDrip:
          type: boolean
        repairTarget:
          type: string
    AircraftWorkflowRequest:
      type: object
      properties:
        component:
          type: string
        leakAreaCm2:
          type: number
          format: double
        continuousDrip:
          type: boolean
        repairTarget:
          type: string
        userIntent:
          type: string
        basicInfoConfirmed:
          type: boolean
        followUpAcknowledged:
          type: boolean
        selectedOptionCode:
          type: string
    EquipmentDiagnosisRequest:
      type: object
      properties:
        currentTemperatureC:
          type: number
          format: double
        vibrationMmPerS:
          type: number
          format: double
        temperatureRiseRatePerMin:
          type: number
          format: double
    EquipmentDispositionRequest:
      type: object
      properties:
        immediateShutdown:
          type: boolean
        reserveBearing:
          type: boolean
        pushWorkOrder:
          type: boolean
    EquipmentWorkflowRequest:
      type: object
      properties:
        currentTemperatureC:
          type: number
          format: double
        vibrationMmPerS:
          type: number
          format: double
        temperatureRiseRatePerMin:
          type: number
          format: double
        immediateShutdown:
          type: boolean
        reserveBearing:
          type: boolean
        pushWorkOrder:
          type: boolean
        userIntent:
          type: string
        basicInfoConfirmed:
          type: boolean
        followUpAcknowledged:
          type: boolean
        selectedOptionCode:
          type: string
